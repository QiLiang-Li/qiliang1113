<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="招财猫联系与打赏页面，可扫码添加制作者微信或打赏一杯奶茶。"
    />
    <title>联系与打赏 — 招财猫</title>
    <link rel="icon" href="images/cat-avatar.png" type="image/png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container inner">
        <a href="index.html" class="logo">
          <img class="logo-icon" src="images/cat-avatar.png" alt="" />
          <span>招财猫</span>
        </a>
        <nav class="nav">
          <a href="index.html#features">功能</a>
          <a href="index.html#download">下载</a>
          <a href="support.html">联系与打赏</a>
        </nav>
        <a href="index.html#download" class="btn btn-primary">立即下载</a>
      </div>
    </header>

    <main>
      <section class="support-page">
        <div class="container">
          <div class="support-card">
            <div class="section-title">
              <span class="support-kicker">联系与打赏</span>
              <h1>谢谢你使用招财猫</h1>
              <p>
                如果你在使用中遇到问题，或有想要的新功能，可以扫码添加制作者微信。觉得好用的话，也欢迎打赏一杯奶茶。
              </p>
            </div>

            <div class="support-grid">
              <article class="qr-card contact-card">
                <span class="qr-tag">联系方式</span>
                <h3>加制作者微信</h3>
                <p>扫码添加微信，反馈问题、建议或功能需求。</p>
                <img src="images/wechat-contact-qr.png" alt="作者微信联系方式二维码" />
              </article>

              <article class="qr-card" id="donate">
                <span class="qr-tag alipay">支付宝</span>
                <h3>支付宝打赏</h3>
                <p>如果招财猫帮到了你，可以请制作者喝杯奶茶。</p>
                <img src="images/alipay-qr.png" alt="支付宝收款码" />
              </article>

              <article class="qr-card">
                <span class="qr-tag wechat">微信支付</span>
                <h3>微信打赏</h3>
                <p>你的支持会鼓励我继续改进这个 App。</p>
                <img src="images/wechat-pay-qr.png" alt="微信支付收款码" />
              </article>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© 2026 招财猫 · 简洁生活，认真记录</p>
      </div>
    </footer>
  </body>
</html>
